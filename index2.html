<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>記帳 APP (獨立後端版)</title>
  <style>
    :root {
      --ink: #202632;
      --muted: #687386;
      --line: #dbe3ee;
      --wash: #f5f7fb;
      --green: #1f9d78;
      --red: #d94b45;
      --blue: #3466d6;
      --income: #2563eb;
      --expense: #d94b45;
      --amber: #c98213;
    }

    * { box-sizing: border-box; }

    /* 💡 修正：原本設為 34px 太大，改為標準 16px，並利用 rem 確保手機版完美比例 */
    html { font-size: 16px; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(31, 157, 120, 0.12), transparent 34%),
        linear-gradient(315deg, rgba(52, 102, 214, 0.10), transparent 36%),
        var(--wash);
      -webkit-text-size-adjust: 100%;
    }

    button, input, select, textarea { font: inherit; }

    .app {
      width: 100%;
      max-width: 480px; /* 💡 最佳化：限制手機版最大寬度，在桌面瀏覽器開啟也不會過寬 */
      margin: 0 auto;
      padding: 16px 12px 32px;
    }

    header {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    h1, .app-title {
      margin: 0;
      font-size: 1.8rem;
      line-height: 1.2;
      font-weight: 900;
    }

    .app-title {
      width: fit-content;
      border: 0;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      text-align: left;
      padding: 0;
    }

    .app-title:hover {
      box-shadow: none;
      transform: none;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.3rem;
    }

    .today {
      width: fit-content;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .page-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 12px;
      padding-bottom: 6px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .page-tabs::-webkit-scrollbar { display: none; }

    button, .page-tab {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 8px 14px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .page-tab {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      white-space: nowrap;
    }

    .page-tab.active {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(32, 38, 50, 0.1);
    }

    button:disabled { cursor: wait; opacity: 0.66; }
    .secondary { background: #e8edf3; color: var(--ink); }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 24px rgba(32, 38, 50, 0.05);
      padding: 16px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    form {
      display: grid;
      gap: 12px;
      width: 100%;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: #fff;
      color: var(--ink);
      font-size: 1rem;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23687386' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 16px;
      padding-right: 32px;
    }

    textarea { min-height: 80px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(52, 102, 214, 0.14);
    }

    .pair-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stack, .history-list, .account-groups, .analysis-list, .account-history, .account-month-list, .summary-grid {
      display: grid;
      gap: 12px;
    }

    .account-month-list {
      padding: 10px;
      background: #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .status.success { color: var(--green); }
    .status.error { color: var(--red); }
    .income { color: var(--income); }
    .expense { color: var(--expense); }

    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .month-block, .account-group, .analysis-card, .account-history-panel, .summary-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      margin-bottom: 8px;
    }

    .month-head, .account-group-head, .account-history-head {
      width: 100%;
      border: 0;
      border-radius: 0;
      padding: 12px;
      background: #eef4fb;
      color: var(--ink);
      box-shadow: none;
      text-align: left;
      font-size: 1rem;
      font-weight: 800;
    }

    .history-row, .account-card, .category-row-button {
      width: 100%;
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      padding: 14px 12px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      box-shadow: none;
    }

    .account-card .meta { display: none; }
    .history-row + .history-row { border-top: 6px solid #f2f6fb; }

    .history-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .history-main {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .history-title { font-size: 1.05rem; font-weight: 700; overflow-wrap: anywhere; }
    .history-note {
      display: inline-block;
      max-width: 15em;
      color: var(--muted);
      font-size: 0.85rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history-amount { font-size: 1.1rem; font-weight: 800; white-space: nowrap; }
    .history-amount.income, .summary-value.income, .total-income { color: var(--income); }
    .history-amount.expense, .summary-value.expense, .total-expense { color: var(--expense); }

    .history-actalamount { 
      display: inline-flex;
      align-items: center;
      margin-top: 4px;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
      background: #fdf8f5;
      color: #78350f;
      border: 1.5px solid #d97706;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 8px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 2px 8px;
      background: #eef5ff;
      color: var(--blue);
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.income { background: #eaf2ff; color: var(--income); }
    .pill.expense { background: #fff1ef; color: var(--red); }
    .pill.transfer { background: #fff7e8; color: var(--amber); }
    .pill.over { background: #fff1ef; color: var(--red); }

    .empty {
      margin: 0;
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    .tool-form { margin: 12px 0; }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      padding: 10px;
      color: var(--muted);
      background: #f8fafc;
      font-size: 0.85rem;
      text-align: left;
    }

    .data-table td { padding: 0; border-bottom: 1px solid var(--line); }
    .category-row-button { border-top: 0; }

    .summary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
    .summary-card { padding: 8px; background: #fff; text-align: center; }
    .summary-label { color: var(--muted); font-size: 0.75rem; font-weight: 700; }
    .summary-value { margin-top: 4px; font-size: 0.95rem; font-weight: 800; overflow: hidden; text-overflow: ellipsis; }
    
    .analysis-card { padding: 14px 12px; }
    .analysis-card-head { display: grid; gap: 6px; margin-bottom: 8px; }
    .analysis-card-title {
      color: var(--ink);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .progress { height: 10px; border-radius: 999px; background: #edf2f7; overflow: hidden; }
    .progress-fill { height: 100%; width: 0; background: var(--blue); }
    .progress-fill.income { background: var(--income); }
    .progress-fill.over { background: var(--red); }
    
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 50;
      width: calc(100% - 32px);
      max-width: 400px;
      border: 1px solid rgba(31, 157, 120, 0.35);
      border-radius: 10px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 12px 28px rgba(32, 38, 50, 0.15);
      color: var(--green);
      font-size: 0.9rem;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 12px);
      transition: opacity 180ms ease, transform 180ms ease;
      text-align: center;
    }
    .toast.is-visible { opacity: 1; transform: translate(-50%, 0); }
    .toast.error { border-color: rgba(217, 75, 69, 0.38); color: var(--red); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <button class="app-title" id="appTitleButton" type="button">記帳 APP</button>
      <div class="today" id="todayLabel"></div>
    </header>

    <div class="toast" id="toastMessage" role="status" aria-live="polite"></div>

    <nav class="page-tabs" aria-label="記帳功能">
      <button class="page-tab active" type="button" data-tab="add">新增項目</button>
      <button class="page-tab" type="button" data-tab="records">歷史項目</button>
      <button class="page-tab" type="button" data-tab="accounts">帳戶來源</button>
      <button class="page-tab" type="button" data-tab="analysis">分析圖表</button>
      <button class="page-tab" type="button" data-tab="categories">類別表</button>
    </nav>

    <section class="tab-panel active" id="tab-add" aria-label="新增項目">
      <article class="panel">
        <div class="row-between">
          <h2 id="recordFormTitle">新增項目</h2>
          <button class="secondary hidden" id="cancelEditButton" type="button">取消修改</button>
        </div>
        <form id="recordForm">
          <div class="pair-grid">
            <label>日期<input id="date" name="date" type="date" required></label>
            <label>類型
              <select id="type" name="type" required>
                <option value="支出">支出</option>
                <option value="收入">收入</option>
                <option value="轉帳">轉帳</option>
              </select>
            </label>
          </div>

          <label>項目名稱<input id="name" name="name" type="text" autocomplete="off" maxlength="80" required></label>
          <div class="pair-grid">
            <label>金額<input id="amount" name="amount" type="number" inputmode="decimal" min="1" step="1" required></label>
            <label>實支<input id="actualAmount" name="actualAmount" type="number" inputmode="decimal" placeholder="留空同金額"></label>
          </div>

          <div id="categoryFields" class="pair-grid">
            <label>主類別<select id="mainCategory" name="mainCategory"></select></label>
            <label>子類別<select id="subCategory" name="subCategory"></select></label>
          </div>

          <div class="pair-grid">
            <label>帳戶分類<select id="accountCategory"></select></label>
            <label>帳戶來源<select id="accountSource" name="accountSource" required></select></label>
          </div>
          <label id="transferAccountLabel" class="hidden">轉入帳戶<select id="transferAccountSource" name="transferAccountSource"></select></label>
          <label>註記<textarea id="note" name="note" maxlength="300"></textarea></label>

          <div class="actions">
            <button id="submitButton" type="submit">新增</button>
            <button class="secondary" id="clearRecordButton" type="button">清空項目</button>
            <button class="secondary" id="refreshDataButton" type="button">重新讀取</button>
            <span class="status" id="formStatus" role="status"></span>
          </div>
        </form>
      </article>
    </section>

    <section class="tab-panel" id="tab-records" aria-label="歷史項目">
      <article class="panel">
        <h2>歷史項目(刷卡金額)</h2>
        <label class="tool-form">月份<select id="recordMonth"></select></label>
        <p class="empty hidden" id="emptyState">目前沒有記帳項目</p>
        <div class="history-list" id="recordsByMonth"></div>
      </article>
    </section>

    <section class="tab-panel" id="tab-accounts" aria-label="帳戶來源">
      <article class="panel">
        <div class="row-between">
          <h2>帳戶來源</h2>
          <button class="secondary" id="accountToggleButton" type="button">新增帳戶</button>
        </div>
        <form class="tool-form hidden" id="accountForm">
          <label>帳戶分類<input id="accountMainCategory" type="text" list="accountGroupOptions" maxlength="40" placeholder="例如：信用卡、現金" required></label>
          <datalist id="accountGroupOptions"></datalist>
          <label>新帳戶來源<input id="newAccountSource" type="text" maxlength="40" required></label>
          <button type="submit">儲存帳戶</button>
        </form>
        <div class="account-groups" id="accountGroups"></div>
        <hr style="border: 0; border-top: 1px solid var(--line); margin: 16px 0;">
        <div class="account-history" id="accountHistory"></div>
      </article>
    </section>

    <section class="tab-panel" id="tab-analysis" aria-label="分析圖表">
      <article class="panel">
        <div class="row-between">
          <h2>分析圖表(實支金額)</h2>
          <button class="secondary" id="budgetToggleButton" type="button">設定預算</button>
        </div>
        <form class="tool-form hidden" id="budgetForm">
          <label>月份<input id="budgetMonth" type="month" required></label>
          <label>主類別<select id="budgetMainCategory" required></select></label>
          <label>預算金額<input id="budgetAmount" type="number" inputmode="decimal" min="0" step="1" required></label>
          <div class="actions">
            <button type="submit">儲存預算</button>
            <button class="secondary" id="copyBudgetButton" type="button">沿用上月</button>
          </div>
        </form>
        <div class="pair-grid" style="margin-bottom: 12px;">
          <label>月份<select id="analysisMonth"></select></label>
          <label>收支
            <select id="analysisType">
              <option value="支出">支出</option>
              <option value="收入">收入</option>
            </select>
          </label>
        </div>
        <div class="analysis-list" id="analysisBreadcrumb"></div>
        <div class="analysis-list" id="analysisSummary"></div>
      </article>
    </section>

    <section class="tab-panel" id="tab-categories" aria-label="類別表">
      <article class="panel">
        <div class="row-between">
          <h2>類別表</h2>
          <button class="secondary" id="categoryToggleButton" type="button">新增類別</button>
        </div>
        <form class="tool-form hidden" id="categoryForm">
          <label>收支
            <select id="categoryType">
              <option value="支出">支出</option>
              <option value="收入">收入</option>
            </select>
          </label>
          <label>主類別<input id="newMainCategory" type="text" maxlength="40" required></label>
          <label>子類別<input id="newSubCategory" type="text" maxlength="40"></label>
          <div class="actions">
            <button id="categorySubmitButton" type="submit">儲存類別</button>
            <button class="secondary hidden" id="cancelCategoryEditButton" type="button">取消修改</button>
          </div>
        </form>
        <table class="data-table">
          <thead><tr><th>收支</th><th>類別</th></tr></thead>
          <tbody id="categoriesBody"></tbody>
        </table>
      </article>
    </section>
  </main>

  <script>
    // 💡 核心修正：定義你的獨立後端真實網址
    // 如果你在本機測試，可以設定成 'http://localhost:3000' 之類的路徑
const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbz2LckLdKcjXT9UlGxkEET6LvL_WVZQYSQgaBdTa9lXmIm_et3zFSvspRvVi5gYfPEO1Q/exec';

    const state = {
      records: [],
      categories: [],
      accounts: [],
      accountSummary: [],
      budgets: [],
      budgetSummary: [],
      activeTab: "add",
      editingRecordId: "",
      editingCategory: null,
      returnContext: null,
      selectedAccount: "",
      selectedRecordMonth: "",
      selectedAccountCategory: "",
      analysisPath: { mainCategory: "", subCategory: "" },
      expandedAccountGroups: new Set(["通用帳戶"]),
    };

    const formatter = new Intl.NumberFormat("zh-Hant-TW", { style: "currency", currency: "TWD", maximumFractionDigits: 0 });

    // DOM 元素選取
    const appTitleButton = document.querySelector("#appTitleButton");
    const dateInput = document.querySelector("#date");
    const typeInput = document.querySelector("#type");
    const nameInput = document.querySelector("#name");
    const amountInput = document.querySelector("#amount");
    const actualAmountInput = document.querySelector("#actualAmount");
    const mainCategoryInput = document.querySelector("#mainCategory");
    const subCategoryInput = document.querySelector("#subCategory");
    const categoryFields = document.querySelector("#categoryFields");
    const accountCategoryInput = document.querySelector("#accountCategory");
    const accountSourceInput = document.querySelector("#accountSource");
    const transferAccountLabel = document.querySelector("#transferAccountLabel");
    const transferAccountSourceInput = document.querySelector("#transferAccountSource");
    const noteInput = document.querySelector("#note");
    const submitButton = document.querySelector("#submitButton");
    const clearRecordButton = document.querySelector("#clearRecordButton");
    const refreshDataButton = document.querySelector("#refreshDataButton");
    const formStatus = document.querySelector("#formStatus");
    const recordFormTitle = document.querySelector("#recordFormTitle");
    const cancelEditButton = document.querySelector("#cancelEditButton");
    const recordsByMonth = document.querySelector("#recordsByMonth");
    const recordMonthInput = document.querySelector("#recordMonth");
    const emptyState = document.querySelector("#emptyState");
    const todayLabel = document.querySelector("#todayLabel");
    const toastMessage = document.querySelector("#toastMessage");
    const accountToggleButton = document.querySelector("#accountToggleButton");
    const accountForm = document.querySelector("#accountForm");
    const newAccountSourceInput = document.querySelector("#newAccountSource");
    const accountMainCategoryInput = document.querySelector("#accountMainCategory");
    const accountGroupOptions = document.querySelector("#accountGroupOptions");
    const accountGroups = document.querySelector("#accountGroups");
    const accountHistory = document.querySelector("#accountHistory");
    const analysisMonthInput = document.querySelector("#analysisMonth");
    const analysisTypeInput = document.querySelector("#analysisType");
    const analysisBreadcrumb = document.querySelector("#analysisBreadcrumb");
    const analysisSummary = document.querySelector("#analysisSummary");
    const budgetToggleButton = document.querySelector("#budgetToggleButton");
    const budgetForm = document.querySelector("#budgetForm");
    const budgetMonthInput = document.querySelector("#budgetMonth");
    const budgetMainCategoryInput = document.querySelector("#budgetMainCategory");
    const budgetAmountInput = document.querySelector("#budgetAmount");
    const copyBudgetButton = document.querySelector("#copyBudgetButton");
    const categoryToggleButton = document.querySelector("#categoryToggleButton");
    const categoryForm = document.querySelector("#categoryForm");
    const categoryTypeInput = document.querySelector("#categoryType");
    const newMainCategoryInput = document.querySelector("#newMainCategory");
    const newSubCategoryInput = document.querySelector("#newSubCategory");
    const categoriesBody = document.querySelector("#categoriesBody");
    const categorySubmitButton = document.querySelector("#categorySubmitButton");
    const cancelCategoryEditButton = document.querySelector("#cancelCategoryEditButton");

    // 💡 修正：完全拔除原本的 Google Script 判斷，100% 強制使用真實 Fetch 請求
    async function apiGetData() {
      return fetch(`${API_BASE_URL}/api/bootstrap`, { headers: { Accept: "application/json" } }).then(parseApiResponse);
    }
    async function apiPost(path, payload) {
      return fetch(`${API_BASE_URL}${path}`, { method: "POST", headers: { Accept: "application/json", "Content-Type": "application/json" }, body: JSON.stringify(payload) }).then(parseApiResponse);
    }
    async function apiPut(path, payload) {
      return fetch(`${API_BASE_URL}${path}`, { method: "PUT", headers: { Accept: "application/json", "Content-Type": "application/json" }, body: JSON.stringify(payload) }).then(parseApiResponse);
    }
    async function parseApiResponse(response) {
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || "操作失敗，請稍後再試");
      return payload;
    }

    // 輔助函式與渲染邏輯 (與原版完全相同，確保介面運作一致)
    function getTodayValue() {
      const now = new Date();
      const offset = now.getTimezoneOffset() * 60000;
      return new Date(now.getTime() - offset).toISOString().slice(0, 10);
    }
    function getCurrentMonth() { return getTodayValue().slice(0, 7); }
    function getWeekday(date) {
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      const parsed = new Date(`${date}T00:00:00+08:00`);
      return Number.isNaN(parsed.getTime()) ? "" : `週${weekdays[parsed.getDay()]}`;
    }
    function escapeText(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" })[char]);
    }
    function setStatus(message, type = "") {
      formStatus.textContent = message;
      formStatus.className = `status ${type}`.trim();
    }
    let toastTimer = 0;
    function showToast(message, type = "success") {
      clearTimeout(toastTimer);
      toastMessage.textContent = message;
      toastMessage.classList.add("is-visible");
      toastMessage.classList.toggle("error", type === "error");
      toastTimer = setTimeout(() => { toastMessage.classList.remove("is-visible"); }, 2200);
      setStatus(message, type);
    }
    function setLoading(isLoading) {
      submitButton.disabled = isLoading;
      submitButton.textContent = isLoading ? (state.editingRecordId ? "儲存中..." : "新增中...") : (state.editingRecordId ? "儲存修改" : "新增");
    }
    function renderSelectOptions(select, values, placeholder = "") {
      select.innerHTML = [placeholder ? `<option value="">${escapeText(placeholder)}</option>` : "", ...values.map((value) => `<option value="${escapeText(value)}">${escapeText(value)}</option>`)].join("");
    }
    function typeClass(type) { return type === "收入" ? "income" : type === "轉帳" ? "transfer" : "expense"; }

    function setActiveTab(tabName) {
      const validTabs = ["add", "records", "accounts", "analysis", "categories"];
      const safeTabName = validTabs.includes(tabName) ? tabName : "add";
      state.activeTab = safeTabName;
      document.querySelectorAll(".page-tab").forEach((tab) => tab.classList.toggle("active", tab.dataset.tab === safeTabName));
      document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.toggle("active", panel.id === `tab-${safeTabName}`));
      if (safeTabName === "analysis") renderAnalysis();
    }

    function applyData(payload) {
      state.records = Array.isArray(payload.records) ? payload.records : [];
      state.categories = Array.isArray(payload.categories) ? payload.categories : [];
      state.accounts = Array.isArray(payload.accounts) ? payload.accounts : [];
      state.accountSummary = Array.isArray(payload.accountSummary) ? payload.accountSummary : [];
      state.budgets = Array.isArray(payload.budgets) ? payload.budgets : [];
      state.budgetSummary = Array.isArray(payload.budgetSummary) ? payload.budgetSummary : [];
      if (!getRecordMonths().includes(state.selectedRecordMonth)) state.selectedRecordMonth = "";
      if (!state.accounts.some((account) => account.accountSource === state.selectedAccount)) state.selectedAccount = "";
      if (!state.selectedAccount && state.accountSummary.length) state.selectedAccount = state.accountSummary[0].accountSource;
      renderAll();
    }

    function getMainCategories(type) {
      return [...new Set(state.categories.filter((category) => category.type === type).map((category) => category.mainCategory).filter(Boolean))];
    }
    function getSubCategories(type, mainCategory) {
      return [...new Set(state.categories.filter((category) => category.type === type && category.mainCategory === mainCategory).map((category) => category.subCategory).filter(Boolean))];
    }
    function getRecordMonths() {
      return [...new Set(state.records.map((record) => String(record.date || "").slice(0, 7)).filter(Boolean))].sort().reverse();
    }
    function getAccountGroupName(account) { return account.mainCategory || "未分類"; }
    function getAccountGroups() {
      return [...new Set(state.accounts.map(getAccountGroupName).filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-Hant"));
    }
    function getSortedRecords(records) {
      return [...records].sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));
    }
    function getAmountClass(type) { return type === "收入" ? "income" : type === "支出" ? "expense" : "transfer"; }
    
    function isAccountAllowed(account, type, mainCategory, subCategory) {
      if (!account.type) return true;
      return account.type === type && (!account.mainCategory || account.mainCategory === mainCategory) && (!account.subCategory || account.subCategory === subCategory);
    }

    function renderCategoryOptions() {
      const isTransfer = typeInput.value === "轉帳";
      categoryFields.classList.toggle("hidden", isTransfer);
      transferAccountLabel.classList.toggle("hidden", !isTransfer);
      if (!isTransfer) {
        const mainCategories = getMainCategories(typeInput.value);
        const selectedMain = mainCategories.includes(mainCategoryInput.value) ? mainCategoryInput.value : mainCategories[0] || "";
        renderSelectOptions(mainCategoryInput, mainCategories);
        mainCategoryInput.value = selectedMain;
        renderSubCategoryOptions();
      }
      renderAccountOptions();
    }

    function renderSubCategoryOptions() {
      const subCategories = getSubCategories(typeInput.value, mainCategoryInput.value);
      const currentSub = subCategoryInput.value;
      renderSelectOptions(subCategoryInput, subCategories, "無");
      subCategoryInput.value = subCategories.includes(currentSub) ? currentSub : "";
      renderAccountOptions();
    }

    function renderAccountOptions() {
      const isTransfer = typeInput.value === "轉帳";
      const allowedAccounts = isTransfer ? state.accounts : state.accounts.filter((account) => isAccountAllowed(account, typeInput.value, mainCategoryInput.value, subCategoryInput.value));
      const groups = [...new Set(allowedAccounts.map(getAccountGroupName))];
      const currentCategory = accountCategoryInput.value;
      const currentAccount = accountSourceInput.value;
      const currentTransfer = transferAccountSourceInput.value;
      renderSelectOptions(accountCategoryInput, groups);
      if (groups.includes(currentCategory)) accountCategoryInput.value = currentCategory;
      else if (groups.length) accountCategoryInput.value = groups[0];
      const categoryAccounts = allowedAccounts.filter((account) => getAccountGroupName(account) === accountCategoryInput.value);
      accountSourceInput.innerHTML = categoryAccounts.map((account) => `<option value="${escapeText(account.accountSource)}">${escapeText(account.accountSource)}</option>`).join("");
      transferAccountSourceInput.innerHTML = state.accounts.map((account) => `<option value="${escapeText(account.accountSource)}">${escapeText(account.accountSource)}</option>`).join("");
      if (categoryAccounts.some((account) => account.accountSource === currentAccount)) accountSourceInput.value = currentAccount;
      if (state.accounts.some((account) => account.accountSource === currentTransfer)) transferAccountSourceInput.value = currentTransfer;
    }

    function renderAccountCategoryOptions() {
      accountGroupOptions.innerHTML = getAccountGroups().map((group) => `<option value="${escapeText(group)}"></option>`).join("");
    }

    function renderBudgetCategoryOptions() {
      const categories = getMainCategories("支出");
      const current = budgetMainCategoryInput.value;
      renderSelectOptions(budgetMainCategoryInput, categories);
      if (categories.includes(current)) budgetMainCategoryInput.value = current;
    }

    function getReturnContext(source, recordId) {
      return { source, recordId, selectedAccount: state.selectedAccount, scrollY: window.scrollY };
    }

    function returnToContext() {
      const context = state.returnContext;
      state.returnContext = null;
      if (!context) return;
      if (context.selectedAccount) state.selectedAccount = context.selectedAccount;
      setActiveTab(context.source);
      renderAll();
      requestAnimationFrame(() => {
        const target = context.recordId ? document.querySelector(`[data-record="${CSS.escape(context.recordId)}"]`) : null;
        if (target) target.scrollIntoView({ block: "center" });
        else window.scrollTo(0, context.scrollY || 0);
      });
    }

    function getRecordPayload() {
      const amount = Number(amountInput.value);
      const actualAmount = actualAmountInput.value === "" ? amount : Number(actualAmountInput.value);
      return {
        recordId: state.editingRecordId,
        date: dateInput.value,
        type: typeInput.value,
        name: nameInput.value.trim(),
        amount,
        actualAmount,
        mainCategory: typeInput.value === "轉帳" ? "轉帳" : mainCategoryInput.value,
        subCategory: typeInput.value === "轉帳" ? "" : subCategoryInput.value,
        accountSource: accountSourceInput.value,
        transferAccountSource: typeInput.value === "轉帳" ? transferAccountSourceInput.value : "",
        note: noteInput.value.trim()
      };
    }

    function resetRecordForm(message = "", shouldReturn = true) {
      state.editingRecordId = "";
      recordFormTitle.textContent = "新增項目";
      submitButton.textContent = "新增";
      cancelEditButton.classList.add("hidden");
      dateInput.value = getTodayValue();
      typeInput.value = "支出";
      nameInput.value = "";
      amountInput.value = "";
      actualAmountInput.value = "";
      noteInput.value = "";
      renderCategoryOptions();
      if (message) setStatus(message, "success");
      if (shouldReturn) returnToContext();
    }

    function startEditRecord(recordId, source) {
      const record = state.records.find((item) => item.recordId === recordId);
      if (!record) return;
      state.returnContext = getReturnContext(source, recordId);
      state.editingRecordId = record.recordId;
      recordFormTitle.textContent = "修改項目";
      submitButton.textContent = "儲存修改";
      cancelEditButton.classList.remove("hidden");
      dateInput.value = record.date;
      typeInput.value = record.type;
      nameInput.value = record.name;
      amountInput.value = record.amount;
      actualAmountInput.value = record.actualAmount;
      noteInput.value = record.note || "";
      renderCategoryOptions();
      mainCategoryInput.value = record.mainCategory;
      renderSubCategoryOptions();
      subCategoryInput.value = record.subCategory;
      renderAccountOptions();
      const sourceAccount = state.accounts.find((account) => account.accountSource === record.accountSource);
      if (sourceAccount) {
        accountCategoryInput.value = getAccountGroupName(sourceAccount);
        renderAccountOptions();
      }
      accountSourceInput.value = record.accountSource;
      transferAccountSourceInput.value = record.transferAccountSource || "";
      setStatus("正在修改歷史項目", "");
      setActiveTab("add");
    }

    function groupByMonth(records) {
      return records.reduce((groups, record) => {
        const month = String(record.date || "").slice(0, 7) || "未填日期";
        groups[month] = groups[month] || [];
        groups[month].push(record);
        return groups;
      }, {});
    }

    function getMonthTotals(records) {
      return records.reduce((totals, record) => {
        const value = Number(record.actualAmount) || 0;
        if (record.type === "收入") totals.income += value;
        if (record.type === "支出") totals.expense += value;
        return totals;
      }, { income: 0, expense: 0 });
    }

    function getRecordCategory(record) {
      if (record.type === "轉帳") return `轉帳至 ${record.transferAccountSource || ""}`;
      return record.subCategory ? `${record.mainCategory} / ${record.subCategory}` : record.mainCategory;
    }

    function renderRecordRows(records, source) {
      return getSortedRecords(records).map((record) => {
        const sign = record.type === "收入" ? "+" : record.type === "支出" ? "-" : "";
        const accountText = record.type === "轉帳" ? `${record.accountSource} → ${record.transferAccountSource}` : record.accountSource;
        const amountClass = getAmountClass(record.type);
        return `
          <button class="history-row" type="button" data-record="${escapeText(record.recordId)}" data-source="${escapeText(source)}">
            <span class="history-main">
              <span class="history-title">${escapeText(record.name)}</span>
              ${record.note ? `<span class="history-note">${escapeText(record.note)}</span>` : ""}
              <span class="meta">
                <span>${escapeText(record.date)} ${escapeText(record.weekday || getWeekday(record.date))}</span>
                <span class="pill ${typeClass(record.type)}">${escapeText(record.type)}</span>
                <span class="pill">${escapeText(getRecordCategory(record))}</span>
                <span>${escapeText(accountText)}</span>
              </span>
            </span>
            <span style="display: flex; flex-direction: column; align-items: flex-end; min-width: max-content">
              <span class="history-amount ${amountClass}">${sign}${formatter.format(Number(record.amount) || 0)}</span>
              ${Number(record.actualAmount) !== Number(record.amount) ? `<span class="history-actalamount">實支：${formatter.format(Number(record.actualAmount) || 0)}</span>` : ""}
            </span>
          </button>
        `;
      }).join("");
    }

    function renderRecords() {
      const months = getRecordMonths();
      if (!state.selectedRecordMonth) state.selectedRecordMonth = months.includes(getCurrentMonth()) ? getCurrentMonth() : months[0] || "";
      renderSelectOptions(recordMonthInput, months);
      if (months.includes(state.selectedRecordMonth)) recordMonthInput.value = state.selectedRecordMonth;
      const list = state.records.filter((record) => String(record.date || "").startsWith(state.selectedRecordMonth));
      emptyState.classList.toggle("hidden", list.length > 0);
      recordsByMonth.classList.toggle("hidden", list.length === 0);
      if (!list.length) { recordsByMonth.innerHTML = ""; return; }
      const totals = getMonthTotals(list);
      recordsByMonth.innerHTML = `
        <section class="month-block">
          <div class="month-head row-between">
            <span>${escapeText(state.selectedRecordMonth)}</span>
            <span><span class="total-income">收入 ${formatter.format(totals.income)}</span> / <span class="total-expense">支出 ${formatter.format(totals.expense)}</span></span>
          </div>
          ${renderRecordRows(list, "records")}
        </section>
      `;
    }

    function renderAccounts() {
      const groups = state.accountSummary.reduce((map, account) => {
        const key = getAccountGroupName(account);
        map[key] = map[key] || [];
        map[key].push(account);
        return map;
      }, {});
      accountGroups.innerHTML = Object.entries(groups).map(([groupName, accounts]) => {
        const isOpen = state.expandedAccountGroups.has(groupName);
        return `
          <section class="account-group">
            <button class="account-group-head row-between" type="button" data-account-group="${escapeText(groupName)}"><span>${escapeText(groupName)}</span><span>${isOpen ? "收合" : "展開"}</span></button>
            <div class="${isOpen ? "" : "hidden"}">
              ${accounts.map((account) => {
                const isSelected = state.selectedAccount === account.accountSource;
                const limit = getAccountGroupName(account);
                return `
                  <button class="account-card ${isSelected ? "active" : ""}" type="button" data-account="${escapeText(account.accountSource)}">
                    <div class="row-between"><strong>${escapeText(account.accountSource)}</strong><strong class="${Number(account.balance) < 0 ? "expense" : "income"}">${formatter.format(account.balance)}</strong></div>
                    <div class="meta">
                      <span class="total-income">收入 ${formatter.format(account.income)}</span>
                      <span class="total-expense">支出 ${formatter.format(account.expense)}</span>
                      <span>${account.count} 筆</span>
                    </div>
                  </button>
                `;
              }).join("")}
            </div>
          </section>
        `;
      }).join("");
      renderAccountHistory();
    }

    function renderAccountHistory() {
      if (!state.selectedAccount) {
        accountHistory.innerHTML = '<p class="empty">點選帳戶來源後，這裡會顯示細項</p>';
        return;
      }
      const records = state.records.filter((record) => record.accountSource === state.selectedAccount || (record.type === "轉帳" && record.transferAccountSource === state.selectedAccount));
      if (!records.length) {
        accountHistory.innerHTML = `<p class="empty">${escapeText(state.selectedAccount)} 目前沒有細項</p>`;
        return;
      }
      const groups = groupByMonth(records);
      const months = Object.keys(groups).sort().reverse();
      accountHistory.innerHTML = `
        <section class="account-history-panel">
          <div class="account-history-head">${escapeText(state.selectedAccount)} 細項</div>
          <div class="account-month-list">
            ${months.map((month) => {
              const items = groups[month];
              const totals = getMonthTotals(items);
              return `
                <section class="month-block">
                  <div class="month-head row-between"><span>${escapeText(month)}</span><span><span class="total-income">收入 ${formatter.format(totals.income)}</span> / <span class="total-expense">支出 ${formatter.format(totals.expense)}</span></span></div>
                  ${renderRecordRows(items, "accounts")}
                </section>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function getAnalysisMonths() {
      return [...new Set(state.records.map((record) => String(record.date || "").slice(0, 7)).filter(Boolean))].sort().reverse();
    }
    function renderAnalysisMonthOptions() {
      const months = getAnalysisMonths();
      const current = analysisMonthInput.value;
      renderSelectOptions(analysisMonthInput, months);
      if (months.includes(current)) analysisMonthInput.value = current;
      else if (months.length) analysisMonthInput.value = months[0];
    }
    function findBudget(month, mainCategory) {
      return state.budgetSummary.find((budget) => budget.month === month && budget.mainCategory === mainCategory);
    }
    function groupRecordsBy(records, getKey) {
      return records.reduce((map, record) => {
        const key = getKey(record) || "無";
        map[key] = map[key] || [];
        map[key].push(record);
        return map;
      }, {});
    }
    function sumActual(records) {
      return records.reduce((sum, record) => sum + (Number(record.actualAmount) || 0), 0);
    }
    function renderAnalysisBreadcrumb() {
      const parts = ["主分類"];
      if (state.analysisPath.mainCategory) parts.push(state.analysisPath.mainCategory);
      if (state.analysisPath.subCategory) parts.push(state.analysisPath.subCategory || "無");
      analysisBreadcrumb.innerHTML = `
        <div class="actions" style="margin-bottom: 8px;">
          <span class="pill">${escapeText(parts.join(" > "))}</span>
          ${state.analysisPath.subCategory ? '<button class="secondary" type="button" data-analysis-back="sub" style="min-height:32px; padding:4px 8px;">返回子分類</button>' : ""}
          ${state.analysisPath.mainCategory ? '<button class="secondary" type="button" data-analysis-back="main" style="min-height:32px; padding:4px 8px;">返回主分類</button>' : ""}
        </div>
      `;
    }
    function renderAnalysisCards(entries, total, level) {
      return entries.sort((a, b) => b.records.length ? sumActual(b.records) - sumActual(a.records) : b.amount - a.amount).map((entry) => {
        const rawName = String(entry.name || "").trim();
        const displayName = rawName || (level === "sub" ? "無" : "未分類");
        const amount = entry.records ? sumActual(entry.records) : entry.amount;
        const percent = total ? Math.min((amount / total) * 100, 100) : 0;
        const displayPercent = total ? ((amount / total) * 100).toFixed(1) : "0.0";
        const budget = analysisTypeInput.value === "支出" && level === "main" ? findBudget(analysisMonthInput.value, rawName) : null;
        const budgetText = budget ? `預算 ${formatter.format(budget.budgetAmount)} / 已用 ${budget.usagePercent.toFixed(1)}%${budget.isOver ? ` / 超出 ${formatter.format(Math.abs(budget.remainingAmount))}` : ""}` : "未設預算";
        const fillClass = budget && budget.isOver ? "over" : analysisTypeInput.value === "收入" ? "income" : "";
        return `
          <button class="analysis-card" type="button" data-analysis-level="${escapeText(level)}" data-analysis-key="${escapeText(displayName)}">
            <div class="analysis-card-head">
              <div class="row-between"><strong class="analysis-card-title">${escapeText(displayName)}</strong><strong class="${analysisTypeInput.value === "收入" ? "income" : "expense"}">${formatter.format(amount)}</strong></div>
              <div class="meta"><span>${displayPercent}%</span>${analysisTypeInput.value === "支出" && level === "main" ? `<span class="pill ${budget && budget.isOver ? "over" : ""}">${escapeText(budgetText)}</span>` : ""}</div>
            </div>
            <div class="progress"><div class="progress-fill ${fillClass}" style="width:${percent}%"></div></div>
          </button>
        `;
      }).join("");
    }
    
    function renderAnalysis() {
      renderAnalysisMonthOptions();
      renderBudgetCategoryOptions();
      const month = analysisMonthInput.value;
      const type = analysisTypeInput.value;
      if (!month) { analysisSummary.innerHTML = '<p class="empty">目前沒有資料</p>'; return; }
      
      const monthRecords = state.records.filter((record) => record.date.startsWith(month));
      const excludeIncomeCategories = ["代付-還錢", "其他", "差額"];
      const incomeTotal = sumActual(monthRecords.filter((record) => record.type === "收入" && !excludeIncomeCategories.includes(record.mainCategory)));
      const excludeexpenseCategories = ["差額"];
      const expenseTotal = sumActual(monthRecords.filter((record) => record.type === "支出" && !excludeexpenseCategories.includes(record.mainCategory)));

      const records = monthRecords.filter((record) => record.type === type);
      const total = sumActual(records);
      renderAnalysisBreadcrumb();
      
      if (!total) {
        analysisSummary.innerHTML = `
          <div class="summary-grid">
            <div class="summary-card"><div class="summary-label">總收入</div><div class="summary-value income">${formatter.format(incomeTotal)}</div></div>
            <div class="summary-card"><div class="summary-label">總支出</div><div class="summary-value expense">${formatter.format(expenseTotal)}</div></div>
            <div class="summary-card"><div class="summary-label">已篩選</div><div class="summary-value">${formatter.format(0)}</div></div>
          </div>
          <p class="empty">本月沒有資料</p>
        `;
        return;
      }
      
      let body = "";
      if (!state.analysisPath.mainCategory) {
        const grouped = groupRecordsBy(records, (record) => record.mainCategory || "未分類");
        body = renderAnalysisCards(Object.entries(grouped).map(([name, groupedRecords]) => ({ name, records: groupedRecords })), total, "main");
      } else if (!state.analysisPath.subCategory) {
        const scoped = records.filter((record) => record.mainCategory === state.analysisPath.mainCategory);
        const subCategories = [...new Set(scoped.map((record) => record.subCategory || "無"))];
        if (subCategories.length <= 1 && subCategories[0] === "無") {
          body = renderRecordRows(scoped, "analysis");
        } else {
          const grouped = groupRecordsBy(scoped, (record) => record.subCategory || "無");
          body = renderAnalysisCards(Object.entries(grouped).map(([name, groupedRecords]) => ({ name, records: groupedRecords })), sumActual(scoped), "sub");
        }
      } else {
        const detailRecords = records.filter((record) => record.mainCategory === state.analysisPath.mainCategory && (record.subCategory || "無") === state.analysisPath.subCategory);
        body = renderRecordRows(detailRecords, "analysis");
      }
      
      analysisSummary.innerHTML = `
        <div class="summary-grid">
          <div class="summary-card"><div class="summary-label">總收入</div><div class="summary-value income">${formatter.format(incomeTotal)}</div></div>
          <div class="summary-card"><div class="summary-label">總支出</div><div class="summary-value expense">${formatter.format(expenseTotal)}</div></div>
          <div class="summary-card"><div class="summary-label">已篩選</div><div class="summary-value ${type === "收入" ? "income" : "expense"}">${formatter.format(total)}</div></div>
        </div>
        ${body}
      `;
    }

    function renderCategories() {
      categoriesBody.innerHTML = state.categories.map((category) => `
        <tr>
          <td><button class="category-row-button" type="button" data-category="${escapeText(JSON.stringify(category))}"><span class="pill ${typeClass(category.type)}">${escapeText(category.type)}</span></button></td>
          <td><button class="category-row-button" type="button" data-category="${escapeText(JSON.stringify(category))}"><strong>${escapeText(category.mainCategory)}</strong><br><span class="meta">${escapeText(category.subCategory || "無")}</span></button></td>
        </tr>
      `).join("");
    }
    
    function startEditCategory(category) {
      state.editingCategory = category;
      categoryTypeInput.value = category.type;
      newMainCategoryInput.value = category.mainCategory;
      newSubCategoryInput.value = category.subCategory || "";
      categoryForm.classList.remove("hidden");
      categoryToggleButton.textContent = "收起新增";
      categorySubmitButton.textContent = "儲存修改";
      cancelCategoryEditButton.classList.remove("hidden");
      newMainCategoryInput.focus();
    }
    
    function resetCategoryForm() {
      state.editingCategory = null;
      newMainCategoryInput.value = "";
      newSubCategoryInput.value = "";
      categorySubmitButton.textContent = "儲存類別";
      cancelCategoryEditButton.classList.add("hidden");
    }

    function renderAll() {
      renderCategoryOptions();
      renderAccountCategoryOptions();
      renderBudgetCategoryOptions();
      renderRecords();
      renderAccounts();
      renderAnalysis();
      renderCategories();
    }
    
    async function loadData() {
      setStatus("讀取中...");
      try {
        applyData(await apiGetData());
        setStatus("");
      } catch (error) {
        setStatus(error.message || "讀取失敗，請確認後端 API 服務是否開啟", "error");
      }
    }

    // 事件監聽
    document.querySelector(".page-tabs").addEventListener("click", (event) => {
      const tab = event.target.closest("[data-tab]");
      if (tab) setActiveTab(tab.dataset.tab);
    });
    typeInput.addEventListener("change", renderCategoryOptions);
    mainCategoryInput.addEventListener("change", renderSubCategoryOptions);
    subCategoryInput.addEventListener("change", renderAccountOptions);
    accountCategoryInput.addEventListener("change", renderAccountOptions);
    recordMonthInput.addEventListener("change", () => {
      state.selectedRecordMonth = recordMonthInput.value;
      renderRecords();
    });
    appTitleButton.addEventListener("click", async () => {
      setStatus("重新讀取中...");
      await loadData();
      setStatus("已重新讀取資料", "success");
    });
    analysisMonthInput.addEventListener("change", () => {
      budgetMonthInput.value = analysisMonthInput.value || getCurrentMonth();
      state.analysisPath = { mainCategory: "", subCategory: "" };
      renderAnalysis();
    });
    analysisTypeInput.addEventListener("change", () => {
      state.analysisPath = { mainCategory: "", subCategory: "" };
      renderAnalysis();
    });

    document.querySelector("#recordForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = getRecordPayload();
      if (!payload.date || !payload.type || !payload.name || !payload.accountSource ) {
        setStatus("請確認欄位已完整填寫", "error");
        return;
      }
      setLoading(true);
      setStatus(state.editingRecordId ? "儲存中..." : "新增中...");
      try {
        const data = state.editingRecordId ? await apiPut("/api/records", payload) : await apiPost("/api/records", payload);
        applyData(data);
        resetRecordForm(state.editingRecordId ? "已儲存修改" : "已新增項目");
      } catch (error) {
        setStatus(error.message || "操作失敗，請稍後再試", "error");
      } finally {
        setLoading(false);
      }
    });
    
    cancelEditButton.addEventListener("click", () => resetRecordForm("已取消修改"));
    clearRecordButton.addEventListener("click", () => resetRecordForm("已清空輸入", false));
    refreshDataButton.addEventListener("click", async () => {
      resetRecordForm("", false);
      await loadData();
      setStatus("已重新讀取資料", "success");
    });
    
    recordsByMonth.addEventListener("click", (event) => {
      const button = event.target.closest("[data-record]");
      if (button) startEditRecord(button.dataset.record, "records");
    });
    accountHistory.addEventListener("click", (event) => {
      const button = event.target.closest("[data-record]");
      if (button) startEditRecord(button.dataset.record, "accounts");
    });
    
    analysisSummary.addEventListener("click", (event) => {
      const recordButton = event.target.closest("[data-record]");
      if (recordButton) {
        startEditRecord(recordButton.dataset.record, "analysis");
        return;
      }
      const card = event.target.closest("[data-analysis-level]");
      if (!card) return;
      if (card.dataset.analysisLevel === "main") state.analysisPath = { mainCategory: card.dataset.analysisKey, subCategory: "" };
      if (card.dataset.analysisLevel === "sub") state.analysisPath.subCategory = card.dataset.analysisKey;
      renderAnalysis();
    });
    
    analysisBreadcrumb.addEventListener("click", (event) => {
      const button = event.target.closest("[data-analysis-back]");
      if (!button) return;
      if (button.dataset.analysisBack === "main") state.analysisPath = { mainCategory: "", subCategory: "" };
      if (button.dataset.analysisBack === "sub") state.analysisPath.subCategory = "";
      renderAnalysis();
    });
    
    accountToggleButton.addEventListener("click", () => {
      const isHidden = accountForm.classList.toggle("hidden");
      accountToggleButton.textContent = isHidden ? "新增帳戶" : "收起新增";
      if (!isHidden) newAccountSourceInput.focus();
    });
    
    accountForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const payload = await apiPost("/api/accounts", { accountSource: newAccountSourceInput.value.trim(), type: "", mainCategory: accountMainCategoryInput.value.trim(), subCategory: "" });
        newAccountSourceInput.value = "";
        accountMainCategoryInput.value = "";
        renderAccountCategoryOptions();
        accountForm.classList.add("hidden");
        accountToggleButton.textContent = "新增帳戶";
        applyData(payload);
        showToast("已新增帳戶來源");
      } catch (error) {
        setStatus(error.message || "新增帳戶失敗", "error");
      }
    });
    
    accountGroups.addEventListener("click", (event) => {
      const groupButton = event.target.closest("[data-account-group]");
      const accountButton = event.target.closest("[data-account]");
      if (accountButton) {
        state.selectedAccount = accountButton.dataset.account;
        renderAccounts();
        return;
      }
      if (!groupButton) return;
      const groupName = groupButton.dataset.accountGroup;
      if (state.expandedAccountGroups.has(groupName)) state.expandedAccountGroups.delete(groupName);
      else state.expandedAccountGroups.add(groupName);
      renderAccounts();
    });
    
    budgetToggleButton.addEventListener("click", () => {
      const isHidden = budgetForm.classList.toggle("hidden");
      budgetToggleButton.textContent = isHidden ? "設定預算" : "收起預算";
    });
    
    budgetForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        const payload = await apiPost("/api/budgets", { month: budgetMonthInput.value, mainCategory: budgetMainCategoryInput.value, budgetAmount: Number(budgetAmountInput.value) });
        budgetAmountInput.value = "";
        applyData(payload);
        showToast("已儲存預算");
      } catch (error) {
        setStatus(error.message || "儲存預算失敗", "error");
      }
    });
    
    copyBudgetButton.addEventListener("click", async () => {
      try {
        applyData(await apiPost("/api/budgets/copy-previous", { month: budgetMonthInput.value }));
        showToast("已沿用上月預算");
      } catch (error) {
        setStatus(error.message || "沿用預算失敗", "error");
      }
    });
    
    categoryToggleButton.addEventListener("click", () => {
      const isHidden = categoryForm.classList.toggle("hidden");
      categoryToggleButton.textContent = isHidden ? "新增類別" : "收起新增";
      if (!isHidden) newMainCategoryInput.focus();
    });
    
    categoryForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const payload = {
        type: categoryTypeInput.value,
        mainCategory: newMainCategoryInput.value.trim(),
        subCategory: newSubCategoryInput.value.trim(),
      };
      if (state.editingCategory) {
        payload.originalType = state.editingCategory.type;
        payload.originalMainCategory = state.editingCategory.mainCategory;
        payload.originalSubCategory = state.editingCategory.subCategory || "";
      }
      try {
        const wasEditing = Boolean(state.editingCategory);
        const data = wasEditing ? await apiPut("/api/categories", payload) : await apiPost("/api/categories", payload);
        resetCategoryForm();
        categoryForm.classList.add("hidden");
        categoryToggleButton.textContent = "新增類別";
        applyData(data);
        showToast(wasEditing ? "已儲存類別修改" : "已新增類別");
      } catch (error) {
        setStatus(error.message || "儲存類別失敗", "error");
      }
    });
    
    cancelCategoryEditButton.addEventListener("click", resetCategoryForm);
    categoriesBody.addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      startEditCategory(JSON.parse(button.dataset.category));
    });

    // 初始啟動
    dateInput.value = getTodayValue();
    budgetMonthInput.value = getCurrentMonth();
    todayLabel.textContent = new Intl.DateTimeFormat("zh-Hant-TW", { month: "long", day: "numeric", weekday: "long" }).format(new Date());
    setActiveTab("add");
    loadData();
  </script>
</body>
</html>
